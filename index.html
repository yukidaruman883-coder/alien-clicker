<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0a1f">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-title" content="エイリアン">
<title>エイリアン・クリッカー</title>
<style>
  :root{
    --bg:#0b0a1f; --panel:#181438; --panel2:#221b4e;
    --cyan:#4fe3c1; --magenta:#e84fbf; --gold:#ffc94f; --violet:#8f7bff;
    --text:#eae6ff; --dim:#9a92c9;
    --n:#8fa3b8; --r:#4fb7e3; --sr:#b57bff; --ur:#ffc94f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Hiragino Maru Gothic ProN","M PLUS Rounded 1c","Yu Gothic",sans-serif;
    display:flex;flex-direction:column;
    user-select:none;-webkit-user-select:none;touch-action:manipulation;
    transition:background 1s;
  }
  #stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{position:absolute;background:#fff;border-radius:50%;opacity:.5;animation:tw 3s infinite ease-in-out;}
  @keyframes tw{0%,100%{opacity:.15}50%{opacity:.7}}

  header{
    position:relative;z-index:2;padding:14px 16px 10px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .dna{
    display:flex;align-items:baseline;gap:6px;
    background:var(--panel);border:1px solid #322a6b;border-radius:999px;
    padding:8px 16px;box-shadow:0 0 18px rgba(79,227,193,.15);
  }
  .dna .num{font-size:22px;font-weight:800;color:var(--cyan);letter-spacing:.5px;}
  .dna .unit{font-size:12px;color:var(--dim);}
  .dps{font-size:11px;color:var(--dim);text-align:right;line-height:1.5;}
  .dps b{color:var(--magenta);font-weight:700;}

  main{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column;}
  .screen{flex:1;display:none;flex-direction:column;overflow:hidden;}
  .screen.active{display:flex;}

  /* ホーム */
  #planetBadge{
    align-self:center;font-size:12px;font-weight:800;letter-spacing:1px;
    background:var(--panel);border:1px solid #322a6b;border-radius:999px;
    padding:5px 14px;margin-top:2px;color:var(--dim);
  }
  #planetBadge b{color:var(--text);}
  #alienStage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
  #alienName{font-size:15px;font-weight:700;margin-bottom:2px;}
  #alienRarity{font-size:11px;margin-bottom:10px;letter-spacing:2px;font-weight:800;}
  #alienBtn{
    width:min(54vw,220px);height:min(54vw,220px);border:none;background:transparent;cursor:pointer;
    filter:drop-shadow(0 0 24px rgba(143,123,255,.45));
    transition:transform .08s;
  }
  #alienBtn:active{transform:scale(.92);}
  #alienBtn svg{width:100%;height:100%;animation:float 3.2s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  #tapHint{font-size:12px;color:var(--dim);margin-top:10px;}
  .pop{
    position:absolute;font-weight:800;color:var(--cyan);font-size:18px;pointer-events:none;
    animation:popUp .8s ease-out forwards;text-shadow:0 0 8px rgba(79,227,193,.8);z-index:5;
  }
  @keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(1.3)}}

  #gachaArea{padding:0 16px 12px;display:flex;gap:10px;}
  .gachaBtn{
    flex:1;border:none;border-radius:16px;padding:12px 4px;cursor:pointer;
    font-family:inherit;font-weight:800;font-size:14px;color:#12102b;
    background:linear-gradient(135deg,var(--cyan),#7bffe0);
    box-shadow:0 4px 0 #1f8f77, 0 0 20px rgba(79,227,193,.3);
    transition:transform .08s, box-shadow .08s;
  }
  .gachaBtn.ten{background:linear-gradient(135deg,var(--magenta),#ff8fe0);box-shadow:0 4px 0 #94307b, 0 0 20px rgba(232,79,191,.3);}
  .gachaBtn.hun{background:linear-gradient(135deg,var(--gold),#ffe9a8);box-shadow:0 4px 0 #a8781f, 0 0 20px rgba(255,201,79,.35);}
  .gachaBtn:active{transform:translateY(3px);box-shadow:0 1px 0 #1f8f77;}
  .gachaBtn.ten:active{box-shadow:0 1px 0 #94307b;}
  .gachaBtn.hun:active{box-shadow:0 1px 0 #a8781f;}
  .gachaBtn:disabled{opacity:.4;filter:grayscale(.6);}
  .gachaBtn small{display:block;font-size:11px;font-weight:700;opacity:.75;margin-top:2px;}

  nav{
    position:relative;z-index:2;display:flex;background:var(--panel);
    border-top:1px solid #322a6b;padding-bottom:env(safe-area-inset-bottom);
  }
  nav button{
    flex:1;background:none;border:none;color:var(--dim);font-family:inherit;
    font-size:12px;font-weight:700;padding:10px 0 8px;cursor:pointer;
  }
  nav button.active{color:var(--cyan);}
  nav button .ico{display:block;font-size:20px;margin-bottom:2px;}

  /* 図鑑 */
  #dexScreen{padding:6px 14px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
  #dexScreen.active{display:block;}
  #dexHead{font-size:13px;color:var(--dim);margin:6px 2px 10px;}
  #dexHead b{color:var(--gold);}
  .dexPlanetTitle{font-size:13px;font-weight:800;margin:14px 2px 8px;display:flex;align-items:center;gap:8px;}
  .dexPlanetTitle .cnt{font-size:11px;color:var(--dim);font-weight:700;}
  .dexGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .card{
    background:var(--panel);border:1px solid #322a6b;border-radius:14px;
    padding:10px 6px;text-align:center;position:relative;cursor:pointer;
  }
  .card.owned{border-color:#4a3f96;}
  .card.selected{border-color:var(--cyan);box-shadow:0 0 12px rgba(79,227,193,.35);}
  .card svg{width:56px;height:56px;}
  .card.locked svg{filter:brightness(0) opacity(.35);}
  .card .nm{font-size:11px;font-weight:700;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card.locked .nm{color:var(--dim);}
  .card .rt{font-size:9px;font-weight:800;letter-spacing:1px;}
  .card .lv{position:absolute;top:5px;right:7px;font-size:9px;font-weight:800;color:var(--gold);}
  .card .st{font-size:9px;color:var(--dim);margin-top:2px;}
  .rN{color:var(--n)} .rR{color:var(--r)} .rSR{color:var(--sr)} .rUR{color:var(--ur)}

  /* 惑星画面 */
  #planetScreen{padding:6px 14px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
  #planetScreen.active{display:block;}
  #galaxyHead{font-size:13px;color:var(--dim);margin:6px 2px 12px;}
  .pCard{
    background:var(--panel);border:1px solid #322a6b;border-radius:18px;
    padding:14px;margin-bottom:12px;display:flex;gap:14px;align-items:center;position:relative;
  }
  .pCard.current{border-color:var(--cyan);box-shadow:0 0 14px rgba(79,227,193,.25);}
  .pCard .orb{width:64px;height:64px;flex-shrink:0;border-radius:50%;position:relative;}
  .pCard.lockedP .orb{filter:grayscale(.9) brightness(.5);}
  .pCard .orb .ring{
    position:absolute;inset:-8px;border:2px solid rgba(255,255,255,.25);border-radius:50%;
    transform:rotateX(65deg);
  }
  .pCard .info{flex:1;min-width:0;}
  .pCard .pname{font-size:15px;font-weight:800;}
  .pCard .psub{font-size:11px;color:var(--dim);margin-top:2px;}
  .pCard .pstat{font-size:11px;color:var(--dim);margin-top:6px;}
  .pCard .pstat b{color:var(--gold);}
  .pAct{
    border:none;border-radius:12px;padding:10px 14px;font-family:inherit;font-weight:800;
    font-size:12px;cursor:pointer;flex-shrink:0;
  }
  .pAct.go{background:var(--cyan);color:#12102b;}
  .pAct.here{background:transparent;color:var(--cyan);border:1px solid var(--cyan);}
  .pAct.unlock{background:var(--gold);color:#2b2210;}
  .pAct:disabled{opacity:.4;}
  .lockReq{font-size:10px;color:var(--dim);margin-top:4px;line-height:1.5;}
  .lockReq .ok{color:var(--cyan);}
  .lockReq .ng{color:#ff7b7b;}

  /* スキル画面 */
  #skillScreen{padding:6px 14px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;}
  #skillScreen.active{display:block;}
  #skillHead{font-size:13px;color:var(--dim);margin:6px 2px 12px;}
  .sCard{
    background:var(--panel);border:1px solid #322a6b;border-radius:18px;
    padding:14px;margin-bottom:12px;display:flex;gap:14px;align-items:center;
  }
  .sCard .sIco{font-size:32px;flex-shrink:0;width:48px;text-align:center;}
  .sCard .info{flex:1;min-width:0;}
  .sCard .sname{font-size:15px;font-weight:800;}
  .sCard .sname .slv{font-size:11px;color:var(--gold);margin-left:6px;}
  .sCard .sdesc{font-size:11px;color:var(--dim);margin-top:2px;}
  .sCard .seff{font-size:11px;margin-top:6px;}
  .sCard .seff b{color:var(--cyan);}
  .sBuy{
    border:none;border-radius:12px;padding:10px 12px;font-family:inherit;font-weight:800;
    font-size:12px;cursor:pointer;flex-shrink:0;background:var(--cyan);color:#12102b;
    line-height:1.4;text-align:center;
  }
  .sBuy small{display:block;font-size:10px;font-weight:700;opacity:.75;}
  .sBuy:disabled{opacity:.4;filter:grayscale(.6);}
  .sBuy.maxed{background:transparent;color:var(--gold);border:1px solid var(--gold);}

  /* ガチャ演出モーダル */
  #modal{
    position:fixed;inset:0;background:rgba(5,4,18,.92);z-index:10;
    display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;
  }
  #modal.show{display:flex;}
  #capsule{width:130px;height:130px;animation:shake .5s ease-in-out 2;}
  @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}
  #resultWrap{display:none;flex-direction:column;align-items:center;gap:14px;max-width:340px;width:100%;}
  #resultWrap.show{display:flex;animation:burst .4s ease-out;}
  @keyframes burst{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
  .resGrid{display:grid;gap:10px;width:100%;justify-content:center;max-height:52vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px;}
  .evoBtn{
    margin-top:6px;border:none;border-radius:8px;padding:5px 8px;width:100%;
    font-family:inherit;font-weight:800;font-size:10px;cursor:pointer;
    background:linear-gradient(135deg,var(--gold),#ffe9a8);color:#2b2210;
    animation:glowPulse 1.4s infinite;
  }
  @keyframes glowPulse{0%,100%{box-shadow:0 0 4px rgba(255,201,79,.4)}50%{box-shadow:0 0 14px rgba(255,201,79,.9)}}
  .resCard{
    background:var(--panel2);border:2px solid;border-radius:14px;padding:10px 6px;text-align:center;
    animation:burst .35s ease-out backwards;
  }
  .resCard svg{width:56px;height:56px;}
  .resCard .nm{font-size:11px;font-weight:700;margin-top:3px;}
  .resCard .tag{font-size:9px;font-weight:800;letter-spacing:1px;}
  .resCard .new{font-size:9px;color:var(--gold);font-weight:800;}
  #closeModal{
    border:none;border-radius:999px;padding:12px 40px;font-family:inherit;font-weight:800;
    font-size:15px;background:var(--cyan);color:#12102b;cursor:pointer;margin-top:6px;
  }
  #modalTitle{font-size:16px;font-weight:800;color:var(--text);}
</style>
</head>
<body>
<div id="stars"></div>

<header>
  <div class="dna"><span class="num" id="dnaNum">0</span><span class="unit">DNA</span></div>
  <div class="dps">自動採取 <b id="dpsNum">0</b>/秒<br>タップ +<span id="tapNum">1</span></div>
</header>

<main>
  <!-- ホーム -->
  <section class="screen active" id="homeScreen">
    <div id="planetBadge"></div>
    <div id="alienStage">
      <div id="alienName">???</div>
      <div id="alienRarity"></div>
      <button id="alienBtn" aria-label="エイリアンをタップ"></button>
      <div id="tapHint">タップしてDNAを採取</div>
    </div>
    <div id="gachaArea">
      <button class="gachaBtn" id="pull1">召喚×1<small id="cost1"></small></button>
      <button class="gachaBtn ten" id="pull10">召喚×10<small id="cost10"></small></button>
      <button class="gachaBtn hun" id="pull100">召喚×100<small id="cost100"></small></button>
    </div>
  </section>

  <!-- スキル -->
  <section class="screen" id="skillScreen">
    <div id="skillHead">研究ラボ — DNAを使って探査能力を強化しよう</div>
    <div id="skillList"></div>
  </section>

  <!-- 図鑑 -->
  <section class="screen" id="dexScreen">
    <div id="dexHead">発見数 <b id="dexCount">0</b> / <span id="dexTotal">0</span> 種 — タップで相棒に設定</div>
    <div id="dexBody"></div>
  </section>

  <!-- 惑星 -->
  <section class="screen" id="planetScreen">
    <div id="galaxyHead">銀河マップ — 星を開拓すると新しいガチャテーブルが解放されます</div>
    <div id="planetList"></div>
  </section>
</main>

<nav>
  <button id="tabHome" class="active"><span class="ico">🛸</span>ホーム</button>
  <button id="tabPlanet"><span class="ico">🪐</span>惑星</button>
  <button id="tabSkill"><span class="ico">🧬</span>スキル</button>
  <button id="tabDex"><span class="ico">📖</span>図鑑</button>
</nav>

<!-- ガチャ演出 -->
<div id="modal">
  <div id="capsulePhase">
    <svg id="capsule" viewBox="0 0 100 100">
      <ellipse cx="50" cy="50" rx="38" ry="44" fill="#221b4e" stroke="#8f7bff" stroke-width="3"/>
      <path d="M12 50 a38 44 0 0 1 76 0" fill="#4fe3c1" opacity=".85"/>
      <circle cx="50" cy="50" r="9" fill="#ffc94f"/>
    </svg>
  </div>
  <div id="resultWrap">
    <div id="modalTitle">新たな生命体を検出!</div>
    <div class="resGrid" id="resGrid"></div>
    <button id="closeModal">OK</button>
  </div>
</div>

<script>
/* ================= 惑星定義 ================= */
// mult: この星の種族のステータス倍率 / cost1: ガチャ単発コスト
// unlock: {cost: 開拓に必要なDNA, need: 前の星で発見が必要な種族数}
const PLANETS = [
  {id:"p1", name:"プロキシマ", sub:"始まりの星",   bg:"#0b0a1f", orb:"radial-gradient(circle at 35% 35%, #8f7bff, #2a1b4e)", mult:1,    cost1:100,    unlock:null},
  {id:"p2", name:"ヴォルカヌス", sub:"溶岩の星",   bg:"#1c0a10", orb:"radial-gradient(circle at 35% 35%, #ff8f5f, #6b1c10)", mult:8,    cost1:800,    unlock:{cost:3000,    need:8}},
  {id:"p3", name:"グラキエス", sub:"氷結の星",     bg:"#081524", orb:"radial-gradient(circle at 35% 35%, #bfeaff, #1c4a6b)", mult:60,   cost1:6000,   unlock:{cost:40000,   need:6}},
  {id:"p4", name:"ヴェルデア", sub:"密林の星",     bg:"#08190e", orb:"radial-gradient(circle at 35% 35%, #8fe89f, #145a2a)", mult:450,  cost1:45000,  unlock:{cost:500000,  need:6}},
  {id:"p5", name:"ノクターン", sub:"暗黒の星",     bg:"#060312", orb:"radial-gradient(circle at 35% 35%, #6b4fbf, #12082b)", mult:3500, cost1:350000, unlock:{cost:6000000, need:7}},
];

/* ================= 種族定義 ================= */
// tap/dpsは基礎値。実効値 = 基礎値 × 惑星mult
const SPECIES = [
  /* --- p1 プロキシマ --- */
  {id:"pico",   p:"p1", name:"ピコロン",     rar:"N",  shape:"round", c1:"#8fa3b8", c2:"#c8d6e5", eyes:1, tap:1,  dps:0.2},
  {id:"mimu",   p:"p1", name:"ミームー",     rar:"N",  shape:"jelly", c1:"#7fc9a8", c2:"#b8f0d6", eyes:2, tap:1,  dps:0.3},
  {id:"guri",   p:"p1", name:"グリグリ",     rar:"N",  shape:"round", c1:"#c9a87f", c2:"#f0dcb8", eyes:3, tap:1,  dps:0.3},
  {id:"pyoko",  p:"p1", name:"ピョコット",   rar:"N",  shape:"tall",  c1:"#a88fc9", c2:"#d9c8f0", eyes:2, tap:1,  dps:0.4},
  {id:"zumi",   p:"p1", name:"ズミゾミ",     rar:"R",  shape:"squid", c1:"#4fb7e3", c2:"#a8e2ff", eyes:2, tap:3,  dps:1.2},
  {id:"beron",  p:"p1", name:"ベロンガ",     rar:"R",  shape:"jelly", c1:"#4fe3c1", c2:"#b8fff0", eyes:1, tap:3,  dps:1.5},
  {id:"togeo",  p:"p1", name:"トゲオー",     rar:"R",  shape:"spike", c1:"#e3844f", c2:"#ffd1a8", eyes:2, tap:4,  dps:1.0},
  {id:"funya",  p:"p1", name:"フニャルラ",   rar:"R",  shape:"tall",  c1:"#7b9fff", c2:"#c8d9ff", eyes:3, tap:3,  dps:1.4},
  {id:"kurage", p:"p1", name:"クラゲッド",   rar:"R",  shape:"squid", c1:"#e84fbf", c2:"#ffb8ec", eyes:1, tap:4,  dps:1.3},
  {id:"nebyu",  p:"p1", name:"ネビュラス",   rar:"SR", shape:"jelly", c1:"#b57bff", c2:"#e3ccff", eyes:3, tap:10, dps:5},
  {id:"vortex", p:"p1", name:"ヴォルテコ",   rar:"SR", shape:"spike", c1:"#8f7bff", c2:"#ccc2ff", eyes:1, tap:12, dps:4.5},
  {id:"plazma", p:"p1", name:"プラズマル",   rar:"SR", shape:"round", c1:"#ff7bd4", c2:"#ffc2ea", eyes:2, tap:11, dps:5.5},
  {id:"quanta", p:"p1", name:"クォンタン",   rar:"SR", shape:"squid", c1:"#7bffe0", c2:"#ccfff4", eyes:3, tap:10, dps:6},
  {id:"omega",  p:"p1", name:"オメガロード", rar:"UR", shape:"spike", c1:"#ffc94f", c2:"#fff0c2", eyes:3, tap:40, dps:20},
  {id:"cosmo",  p:"p1", name:"コスモゼウス", rar:"UR", shape:"squid", c1:"#ffd97b", c2:"#ffffff", eyes:1, tap:45, dps:18},
  {id:"eterna", p:"p1", name:"エテルナリア", rar:"UR", shape:"jelly", c1:"#fff08f", c2:"#ffffff", eyes:2, tap:42, dps:22},

  /* --- p2 ヴォルカヌス --- */
  {id:"magmal", p:"p2", name:"マグマル",     rar:"N",  shape:"round", c1:"#e36a4f", c2:"#ffb08f", eyes:2, tap:1,  dps:0.3},
  {id:"honopo", p:"p2", name:"ホノポン",     rar:"N",  shape:"jelly", c1:"#ff8f5f", c2:"#ffd1a8", eyes:1, tap:1,  dps:0.3},
  {id:"kemurin",p:"p2", name:"ケムリン",     rar:"N",  shape:"tall",  c1:"#9a8a85", c2:"#d1c5bf", eyes:3, tap:1,  dps:0.4},
  {id:"fairo",  p:"p2", name:"ファイアロ",   rar:"R",  shape:"spike", c1:"#ff5f3f", c2:"#ffbfa8", eyes:2, tap:4,  dps:1.3},
  {id:"yougan", p:"p2", name:"ヨウガンダ",   rar:"R",  shape:"squid", c1:"#e3844f", c2:"#ffd1a8", eyes:1, tap:3,  dps:1.4},
  {id:"boruke", p:"p2", name:"ボルケーノン", rar:"R",  shape:"round", c1:"#ff7f4f", c2:"#ffd8bf", eyes:3, tap:4,  dps:1.2},
  {id:"ifrita", p:"p2", name:"イフリータス", rar:"SR", shape:"spike", c1:"#ff9f2f", c2:"#ffe0a8", eyes:2, tap:11, dps:5.5},
  {id:"promi",  p:"p2", name:"プロミネンス", rar:"UR", shape:"squid", c1:"#ffcf4f", c2:"#fff4d1", eyes:3, tap:42, dps:21},

  /* --- p3 グラキエス --- */
  {id:"koorin", p:"p3", name:"コオリン",     rar:"N",  shape:"round", c1:"#9fd4f0", c2:"#e0f4ff", eyes:2, tap:1,  dps:0.3},
  {id:"yukipo", p:"p3", name:"ユキポ",       rar:"N",  shape:"jelly", c1:"#cfe8ff", c2:"#ffffff", eyes:1, tap:1,  dps:0.3},

   eff:lv=>`SR ${8+lv}% / UR ${2+0.5*lv}%`},

const planetOf = id => PLANETS.find(p=>p.id===id);
const speciesOf = id => SPECIES.find(s=>s.id===id);
const evoMult = sp => (S.evolved && S.evolved[sp.id]) ? EVO_MULT : 1;
const effTap = sp => sp.tap * planetOf(sp.p).mult * evoMult(sp);
const effDps = sp => sp.dps * planetOf(sp.p).mult * evoMult(sp);

/* ================= セーブデータ ================= */
let S = { dna:50, owned:{ pico:1 }, partner:"pico", planet:"p1", unlocked:["p1"], evolved:{}, skills:{} };

// 保存先アダプタ: Claude Artifacts環境ではwindow.storage、
// 通常のブラウザ(GitHub Pagesなど)ではlocalStorageを使う
const store = {
  async get(k){
    if(typeof window.storage !== "undefined" && window.storage){
      try{ const r = await window.storage.get(k); return r ? r.value : null; }
      catch(e){ return null; }
    }
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  async set(k, v){
    if(typeof window.storage !== "undefined" && window.storage){
      try{ await window.storage.set(k, v); return; }catch(e){}
    }
    try{ localStorage.setItem(k, v); }catch(e){}
  }
};

async function load(){
  try{
    const raw = await store.get(KEY);
    if(raw){
      const d = JSON.parse(raw);
      S = Object.assign(S, d);
      // v1セーブからの移行
      if(!S.unlocked) S.unlocked = ["p1"];
      if(!S.planet) S.planet = "p1";
      if(!S.evolved) S.evolved = {};
      if(!S.skills) S.skills = {};
    }
  }catch(e){ /* 初回・破損時は初期状態で開始 */ }
}
async function persist(){
  try{ await store.set(KEY, JSON.stringify(S)); }catch(e){}
}
let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 800);
}
// アプリを閉じる/バックグラウンドに回った瞬間に即時保存(モバイル対策)
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "hidden") persist();
});

/* ================= 計算 ================= */
function tapPower(){
  let p = 1;
  for(const id in S.owned){
    const sp = speciesOf(id); if(!sp) continue;
    p += effTap(sp) * (1 + (S.owned[id]-1)*0.2);
  }
  return Math.round(p * Math.pow(2, skillLv("tap")));
}
function totalDps(){
  let d = 0;
  for(const id in S.owned){
    const sp = speciesOf(id); if(!sp) continue;
    d += effDps(sp) * (1 + (S.owned[id]-1)*0.2);
  }
  return d * Math.pow(2, skillLv("dps"));
}
function discoveredOn(pid){
  return SPECIES.filter(s=>s.p===pid && S.owned[s.id]).length;
}
function fmt(n){
  if(n>=1e9) return (n/1e9).toFixed(1)+"G";
  if(n>=1e6) return (n/1e6).toFixed(1)+"M";
  if(n>=1e3) return (n/1e3).toFixed(1)+"K";
  return Math.floor(n).toString();
}

  const pl = curPlanet();
  const base = n===1 ? pl.cost1 : n===10 ? pl.cost1*9 : pl.cost1*80;
  return Math.ceil(base * (1 - 0.05 * skillLv("disc")));
}

function refreshPlanets(){

        : `<button class="pAct go" data-go="${pl.id}">移動</button>`;
    }else{
      const prev = PLANETS[i-1];

      info = `<div class="pname">？？？</div>

        : `<button class="sBuy" data-skill="${sk.id}" ${S.dna >= cost ? "" : "disabled"}>強化<small>${fmt(cost)} DNA</small></button>`);

/* ================= ガチャ ================= */
function rollOne(){
  const luck = skillLv("luck");
  const rates = {UR: 2 + 0.5*luck, SR: 8 + 1*luck, R: 30};
  rates.N = 100 - rates.UR - rates.SR - rates.R;
  const r = Math.random()*100;
  let rar = "N", acc = 0;
  for(const k of ["UR","SR","R","N"]){
    acc += rates[k];
    if(r < acc){ rar = k; break; }
  }
  const pool = SPECIES.filter(s=>s.p===S.planet && s.rar===rar);
  return pool[Math.floor(Math.random()*pool.length)];
}
function doGacha(n){
  const cost = gachaCost(n);
  if(S.dna < cost) return;
  S.dna -= cost;
  const results = [];
  for(let i=0;i<n;i++){
    const sp = rollOne();
    const isNew = !S.owned[sp.id];
    S.owned[sp.id] = (S.owned[sp.id]||0) + 1;
    results.push({sp, isNew, lv:S.owned[sp.id]});
  }
  save(); refreshAll();
  showResults(results);
}
function showResults(results){
  const modal = $("modal");
  modal.classList.add("show");
  $("modalTitle").textContent = "新たな生命体を検出!";
  $("capsulePhase").style.display = "block";
  $("resultWrap").classList.remove("show");
  setTimeout(()=>{
    $("capsulePhase").style.display = "none";
    const grid = $("resGrid");
    grid.innerHTML = "";
    // 100連などの大量結果は種族ごとに集計して表示
    let items;
    if(results.length > 10){
      const agg = {};
      for(const r of results){
        const a = agg[r.sp.id] || (agg[r.sp.id] = {sp:r.sp, count:0, isNew:false, lv:0});
        a.count++; a.isNew = a.isNew || r.isNew; a.lv = Math.max(a.lv, r.lv);
      }
      items = Object.values(agg).sort((a,b)=>RARORDER[b.sp.rar]-RARORDER[a.sp.rar]);
    }else{
      items = results.map(r=>({sp:r.sp, count:1, isNew:r.isNew, lv:r.lv}));
    }
    grid.style.gridTemplateColumns = items.length===1 ? "1fr" : "repeat(auto-fit, minmax(88px, 1fr))";
    items.forEach((r,i)=>{
      const c = document.createElement("div");
      c.className = "resCard";
      c.style.borderColor = RARCOL[r.sp.rar];
      c.style.animationDelay = (Math.min(i,12)*0.06)+"s";
      c.innerHTML = alienSVG(r.sp, items.length===1 ? 110 : 56) +
        `<div class="nm">${r.sp.name}${r.count>1 ? " ×"+r.count : ""}</div>` +
        `<div class="tag" style="color:${RARCOL[r.sp.rar]}">${r.sp.rar}</div>` +
        (r.isNew ? `<div class="new">✦ NEW!</div>` : `<div class="new" style="color:var(--dim)">Lv.${r.lv}</div>`);
      grid.appendChild(c);
    });
    $("resultWrap").classList.add("show");
  }, 1100);
}
function doEvolve(id){
  const sp = speciesOf(id);
  if(!sp || (S.owned[id]||0) < EVO_LV || S.evolved[id]) return;
  S.evolved[id] = true;
  save(); refreshAll();
  // 進化演出
  const modal = $("modal");
  modal.classList.add("show");
  $("capsulePhase").style.display = "none";
  $("modalTitle").textContent = "✨ " + sp.name + " が進化した!";
  const grid = $("resGrid");
  grid.innerHTML = "";
  grid.style.gridTemplateColumns = "1fr";
  const c = document.createElement("div");
  c.className = "resCard";
  c.style.borderColor = "#ffc94f";
  c.innerHTML = alienSVG(sp, 110, true) +
    `<div class="nm">★${sp.name}</div>` +
    `<div class="new">全ステータス ×${EVO_MULT}!</div>`;
  grid.appendChild(c);
  $("resultWrap").classList.add("show");
}
$("pull1").onclick = ()=>doGacha(1);
$("pull10").onclick = ()=>doGacha(10);
$("pull100").onclick = ()=>doGacha(100);
$("closeModal").onclick = ()=>$("modal").classList.remove("show");

/* ================= タブ ================= */
const TABS = [["tabHome","homeScreen"],["tabPlanet","planetScreen"],["tabSkill","skillScreen"],["tabDex","dexScreen"]];
for(const [tid,sid] of TABS){
  $(tid).onclick = ()=>{
    for(const [t,s] of TABS){
      $(t).classList.toggle("active", t===tid);
      $(s).classList.toggle("active", s===sid);
    }
    if(sid==="dexScreen") refreshDex();
    if(sid==="planetScreen") refreshPlanets();
    if(sid==="skillScreen") refreshSkills();
  };
}

/* ================= 自動採取ループ ================= */
setInterval(()=>{
  const d = totalDps();
  if(d>0){ S.dna += d/10; refreshHeader(); }
  // スキル画面を開いている間はボタンの押下可否も追従させる
  if($("skillScreen").classList.contains("active")){
    document.querySelectorAll("[data-skill]").forEach(b=>{
      const sk = SKILLS.find(s=>s.id===b.dataset.skill);
      if(sk) b.disabled = S.dna < skillCost(sk);
    });
  }
}, 100);
setInterval(save, 5000);

/* ================= 星の生成 ================= */
(function(){
  const box = $("stars");
  for(let i=0;i<60;i++){
    const s = document.createElement("div");
    s.className = "star";
    const sz = Math.random()*2+1;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;`;
    box.appendChild(s);
  }
})();

/* ================= 起動 ================= */
load().then(refreshAll);
</script>
</body>
